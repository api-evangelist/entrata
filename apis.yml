apis:
- name: Entrata API
  description: The Entrata API provides programmatic access to the Entrata property
    management platform, enabling integration partners to read and write property,
    resident, lease, maintenance, payment, and financial data. The API uses a service-oriented
    model with XML and JSON support, and requires IP whitelisting and partner agreement
    for access.
