aid: entrata
name: Entrata
description: Entrata is a property management platform for multifamily housing that
  provides an all-in-one operating system for autonomous property management. Its
  REST API enables integration partners to access and manage properties, residents,
  leases, maintenance, payments, and reporting data in near real-time. API access
  requires a signed Developer Interface Agreement and is available only to approved
  partners with shared clients.
